<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aging in Place Bathroom Checklist | All-Star Renovations</title>
    <meta name="description" content="Free checklist to evaluate your bathroom for aging in place safety and accessibility in Conway and Central Arkansas.">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50">
    <div class="max-w-3xl mx-auto px-6 py-16 text-center">
        <h1 class="section-header text-4xl tracking-tighter">Free Aging in Place Bathroom Checklist</h1>
        <p class="mt-4 text-lg">Evaluate your current bathroom for safety and plan the perfect accessible transformation.</p>

        <div class="mt-10 bg-white border rounded-3xl p-8 max-w-md mx-auto">
            <form class="space-y-4">
                <input type="text" placeholder="Full Name" class="w-full border rounded-2xl px-4 py-3">
                <input type="email" placeholder="Email Address" class="w-full border rounded-2xl px-4 py-3">
                <button type="submit" class="w-full bg-emerald-600 text-white font-semibold py-3 rounded-2xl">Download Free Checklist</button>
            </form>
        </div>
    </div>
